version: '3.8'

name: ai-devops-orchestrator

services:
  # =============================================================================
  # AI Analysis Engine (LangChain + FastAPI)
  # =============================================================================
  langchain-api:
    image: ai-devops-orchestrator/langchain-api:latest
    build:
      context: ./services/langchain-api
      dockerfile: Dockerfile
    container_name: ai-devops-langchain-api
    profiles: ["legacy-demo"]
    ports:
      - "${LANGCHAIN_API_PORT:-8000}:8000"
    environment:
      # AI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4-turbo}
      - AI_CONFIDENCE_THRESHOLD=${AI_CONFIDENCE_THRESHOLD:-0.7}

      # Database connections
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMADB_COLLECTION_NAME=${CHROMADB_COLLECTION_NAME:-devops_knowledge}
      - REDIS_URL=redis://redis:6379/0

      # GitHub integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}

      # Security
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5678}

      # Monitoring
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}

    volumes:
      - ./services/langchain-api:/app
      - langchain_logs:/app/logs
    depends_on:
      - chromadb
      - redis
    networks:
      - ai-devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # Workflow Automation (n8n)
  # =============================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-devops-n8n
    profiles: ["legacy-demo"]
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Basic Authentication
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}

      # Webhook configuration
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/webhook}
      - N8N_PAYLOAD_SIZE_MAX=16
      - N8N_EXECUTION_TIMEOUT=${N8N_EXECUTION_TIMEOUT:-300}

      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password

      # Generic timezone setting
      - GENERIC_TIMEZONE=UTC

      # Security
      - N8N_SECURE_COOKIE=false
      - N8N_DISABLE_UI=false

    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows:ro
      - ./n8n-credentials:/credentials:ro
    depends_on:
      - postgres
      - langchain-api
    networks:
      - ai-devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Vector Database (ChromaDB)
  # =============================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-devops-chromadb
    profiles: ["legacy-demo"]
    ports:
      - "${CHROMADB_PORT:-8001}:8000"
    environment:
      - CHROMA_HOST=0.0.0.0
      - CHROMA_PORT=8000
      - CHROMA_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb_data:${CHROMADB_PERSIST_DIRECTORY:-/chroma/chroma}
    networks:
      - ai-devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Cache Layer (Redis)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: ai-devops-redis
    profiles: ["legacy-demo"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Database (PostgreSQL for n8n)
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-devops-postgres
    profiles: ["legacy-demo"]
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password
      - POSTGRES_NON_ROOT_USER=n8n
      - POSTGRES_NON_ROOT_PASSWORD=n8n_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Monitoring & Observability (Optional)
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-devops-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ai-devops-network
    restart: unless-stopped
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: ai-devops-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ai-devops-network
    restart: unless-stopped
    profiles: ["monitoring"]

  # =============================================================================
  # Log Aggregation (Optional)
  # =============================================================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ai-devops-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ai-devops-network
    restart: unless-stopped
    profiles: ["logging"]

  kibana:
    image: kibana:8.11.0
    container_name: ai-devops-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ai-devops-network
    restart: unless-stopped
    profiles: ["logging"]

  logstash:
    image: logstash:8.11.0
    container_name: ai-devops-logstash
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
    depends_on:
      - elasticsearch
    networks:
      - ai-devops-network
    restart: unless-stopped
    profiles: ["logging"]

# =============================================================================
# Networks
# =============================================================================
networks:
  ai-devops-network:
    name: ai-devops-network
    driver: bridge

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  # Core data
  chromadb_data:
    name: ai-devops-chromadb-data
  postgres_data:
    name: ai-devops-postgres-data
  redis_data:
    name: ai-devops-redis-data
  n8n_data:
    name: ai-devops-n8n-data

  # Logs
  langchain_logs:
    name: ai-devops-langchain-logs

  # Monitoring (optional)
  prometheus_data:
    name: ai-devops-prometheus-data
  grafana_data:
    name: ai-devops-grafana-data

  # Logging (optional)
  elasticsearch_data:
    name: ai-devops-elasticsearch-data